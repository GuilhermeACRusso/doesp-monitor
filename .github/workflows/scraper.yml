name: DOESP Monitor

on:
  schedule:
    # 07:30 BRT (UTC-3) = 10:30 UTC, segunda a sexta
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests "pdfminer.six>=20221105"

      - name: Rodar monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID:        ${{ secrets.CHAT_ID }}
        run: python main.py
